<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0f">
<title>辞書 • Słownik • Словарь • 词典 • Dicionário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Spectral:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --text: #e8e6e0;
    --muted: #6b6875;
    --accent-ja: #c9a96e;
    --accent-zh: #e05c5c;
    --accent-ru: #7b9fd4;
    --accent-pl: #6bbf8e;
    --accent-pt: #e8a045;
    --niveau-new: #4a8fc1;
    --niveau-progress: #c9883a;
    --niveau-done: #5aad7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Spectral', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    letter-spacing: 0.15em;
    color: var(--text);
    line-height: 1.2;
  }

  h1 span {
    display: block;
    font-family: 'Spectral', serif;
    font-size: 0.55em;
    font-style: italic;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-top: 0.3rem;
  }

  .entry-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 340px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Spectral', serif;
    font-size: 0.9rem;
    padding: 0.55rem 0.9rem 0.55rem 2.2rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--muted); }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.65rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  .lang-filters {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    padding: 0.4rem 0.75rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .filter-btn:hover { color: var(--text); border-color: var(--muted); }
  .filter-btn.active { color: var(--bg); border-color: transparent; }
  .filter-btn[data-lang="ja"].active { background: var(--accent-ja); }
  .filter-btn[data-lang="zh"].active { background: var(--accent-zh); }
  .filter-btn[data-lang="ru"].active { background: var(--accent-ru); }
  .filter-btn[data-lang="pl"].active { background: var(--accent-pl); }
  .filter-btn[data-lang="pt"].active { background: var(--accent-pt); }
  .filter-btn[data-lang="all"].active { background: var(--muted); }

  /* NIVEAU FILTERS */
  .niveau-filters {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .niv-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.35rem 0.6rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .niv-btn.active[data-niv="Nouveau"] { background: var(--niveau-new); color: #fff; border-color: transparent; }
  .niv-btn.active[data-niv="En cours"] { background: var(--niveau-progress); color: #fff; border-color: transparent; }
  .niv-btn.active[data-niv="Maîtrisé"] { background: var(--niveau-done); color: #fff; border-color: transparent; }
  .niv-btn.active[data-niv="all"] { background: var(--muted); color: var(--bg); border-color: transparent; }

  /* MAIN */
  main {
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* CARD */
  .word-card {
    border-bottom: 1px solid var(--border);
    padding: 1.4rem 0;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 4px;
  }

  .word-card:hover { background: var(--surface); padding-left: 0.75rem; padding-right: 0.75rem; margin: 0 -0.75rem; }

  .lang-dot {
    width: 3px;
    border-radius: 2px;
    align-self: stretch;
    min-height: 40px;
    flex-shrink: 0;
  }

  .lang-dot.ja { background: var(--accent-ja); }
  .lang-dot.zh { background: var(--accent-zh); }
  .lang-dot.ru { background: var(--accent-ru); }
  .lang-dot.pl { background: var(--accent-pl); }
  .lang-dot.pt { background: var(--accent-pt); }

  .card-content { display: flex; flex-direction: column; gap: 0.5rem; }

  .card-top {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .word-main {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.4rem, 3.5vw, 1.9rem);
    font-weight: 400;
    line-height: 1;
    color: var(--text);
  }

  .word-reading {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.95rem;
    color: var(--muted);
    font-weight: 300;
  }

  .word-roman {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .translation {
    font-style: italic;
    color: var(--text);
    font-size: 1rem;
  }

  .category-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    text-transform: uppercase;
    border: 1px solid;
  }

  .cat-verbe { color: #c97fb5; border-color: #c97fb544; background: #c97fb510; }
  .cat-nom { color: #89b4d4; border-color: #89b4d444; background: #89b4d410; }
  .cat-adjectif { color: #a8d48a; border-color: #a8d48a44; background: #a8d48a10; }
  .cat-salutation { color: #f0c060; border-color: #f0c06044; background: #f0c06010; }
  .cat-conjonction { color: #c084db; border-color: #c084db44; background: #c084db10; }
  .cat-expression { color: #f0a070; border-color: #f0a07044; background: #f0a07010; }
  .cat-adverbe { color: #80c8a0; border-color: #80c8a044; background: #80c8a010; }
  .cat-particule { color: #a0c0f0; border-color: #a0c0f044; background: #a0c0f010; }
  .cat-preposition { color: #d4a0c0; border-color: #d4a0c044; background: #d4a0c010; }
  .cat-compteur { color: #f0d080; border-color: #f0d08044; background: #f0d08010; }
  .cat-mesure { color: #f0d080; border-color: #f0d08044; background: #f0d08010; }

  .niveau-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    padding: 0.15rem 0.45rem;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .niv-Nouveau { background: var(--niveau-new)22; color: var(--niveau-new); border: 1px solid var(--niveau-new)55; }
  .niv-En.cours { background: var(--niveau-progress)22; color: var(--niveau-progress); border: 1px solid var(--niveau-progress)55; }
  .niv-Maîtrisé { background: var(--niveau-done)22; color: var(--niveau-done); border: 1px solid var(--niveau-done)55; }

  /* TON BADGE (mandarin) */
  .ton-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.2rem 0.55rem;
    border-radius: 3px;
    background: var(--accent-zh)15;
    border: 1px solid var(--accent-zh)40;
    color: var(--accent-zh);
  }

  /* EXPANDED SECTION */
  .card-expanded {
    display: none;
    margin-top: 0.8rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
    gap: 1rem;
    flex-direction: column;
  }

  .word-card.open .card-expanded { display: flex; }

  .phrase-block {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .phrase-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .phrase-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    color: var(--text);
    line-height: 1.5;
  }

  .phrase-roman {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .phrase-fr {
    font-style: italic;
    font-size: 0.9rem;
    color: var(--muted);
  }

  /* AUDIO BUTTON */
  .audio-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.35rem 0.7rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .audio-btn:hover { color: var(--text); border-color: var(--muted); }
  .audio-btn.playing { color: var(--accent-ja); border-color: var(--accent-ja)60; }

  .audio-btn svg { width: 10px; height: 10px; fill: currentColor; }

  .audio-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }

  /* NOTES BLOCK */
  .notes-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--muted);
  }

  .notes-block strong { color: var(--text); font-weight: 600; }

  .declension-table {
    display: grid;
    grid-template-columns: auto auto;
    gap: 0.2rem 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    margin-top: 0.5rem;
  }

  .decl-case { color: var(--muted); }
  .decl-form { color: var(--text); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); font-style: italic; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header, main { padding-left: 1rem; padding-right: 1rem; }
    .word-main { font-size: 1.5rem; }
  }

  /* ADD BUTTON */
  .fab {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 10;
  }
  .fab:hover { color: var(--text); border-color: var(--muted); transform: scale(1.05); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #0008;
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .modal h2 {
    font-family: 'Spectral', serif;
    font-weight: 400;
    font-size: 1.1rem;
    font-style: italic;
  }

  .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-group label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Spectral', serif;
    font-size: 0.9rem;
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--muted); }
  .form-group select option { background: var(--surface2); }
  .form-group textarea { resize: vertical; min-height: 60px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 0.5rem; }
  .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.06em; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
  .btn-save { background: var(--accent-ja); border: none; color: var(--bg); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.06em; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: 600; }

  .lang-fields { display: none; flex-direction: column; gap: 0.75rem; }
  .lang-fields.visible { display: flex; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>
      辞書 · Słownik · Словарь · 词典 · Dicionário
      <span>dictionnaire personnel · 5 langues</span>
    </h1>
    <div class="entry-count" id="entryCount">— entrées</div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Rechercher un mot…">
    </div>
    <div class="lang-filters">
      <button class="filter-btn active" data-lang="all">Tout</button>
      <button class="filter-btn" data-lang="ja">日本語</button>
      <button class="filter-btn" data-lang="zh">中文</button>
      <button class="filter-btn" data-lang="ru">Рус</button>
      <button class="filter-btn" data-lang="pl">PL</button>
      <button class="filter-btn" data-lang="pt">PT</button>
    </div>
    <div class="niveau-filters">
      <button class="niv-btn active" data-niv="all">Tous</button>
      <button class="niv-btn" data-niv="Nouveau">Nouveau</button>
      <button class="niv-btn" data-niv="En cours">En cours</button>
      <button class="niv-btn" data-niv="Maîtrisé">Maîtrisé</button>
    </div>
  </div>
</header>

<main id="wordList"></main>

<button class="fab" id="addBtn" title="Ajouter un mot">+</button>

<!-- MODAL AJOUT -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Ajouter une entrée</h2>

    <div class="form-row">
      <div class="form-group">
        <label>Langue</label>
        <select id="f_lang">
          <option value="ja">Japonais</option>
          <option value="zh">Mandarin</option>
          <option value="ru">Russe</option>
          <option value="pl">Polonais</option>
          <option value="pt">Portugais (BR)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Niveau</label>
        <select id="f_niveau">
          <option value="Nouveau">Nouveau</option>
          <option value="En cours">En cours</option>
          <option value="Maîtrisé">Maîtrisé</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Mot (natif)</label>
        <input type="text" id="f_word" placeholder="食べる / 吃 / говорить">
      </div>
      <div class="form-group">
        <label>Traduction FR</label>
        <input type="text" id="f_translation" placeholder="Manger">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Catégorie</label>
        <select id="f_category"></select>
      </div>
      <div class="form-group">
        <label>Romanisation</label>
        <input type="text" id="f_roman" placeholder="taberu / chī / govorit'">
      </div>
    </div>

    <!-- Champs japonais -->
    <div class="lang-fields" id="fields_ja">
      <div class="form-group">
        <label>Hiragana</label>
        <input type="text" id="f_ja_hira" placeholder="たべる">
      </div>
      <div class="form-group">
        <label>Sous-catégorie verbe (optionnel)</label>
        <input type="text" id="f_ja_subcat" placeholder="ichidan / godan">
      </div>
    </div>

    <!-- Champs mandarin -->
    <div class="lang-fields" id="fields_zh">
      <div class="form-row">
        <div class="form-group">
          <label>Ton</label>
          <input type="text" id="f_zh_ton" placeholder="Ton 1 (—)">
        </div>
        <div class="form-group">
          <label>Notation ton</label>
          <input type="text" id="f_zh_ton_symbol" placeholder="¯ / ˊ / ˇ / ˋ">
        </div>
      </div>
    </div>

    <!-- Champs polonais -->
    <div class="lang-fields" id="fields_pl">
      <div class="form-row">
        <div class="form-group">
          <label>Genre</label>
          <select id="f_pl_genre">
            <option value="">—</option>
            <option value="masculin">Masculin</option>
            <option value="féminin">Féminin</option>
            <option value="neutre">Neutre</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Champs russe -->
    <div class="lang-fields" id="fields_ru">
      <div class="form-row">
        <div class="form-group">
          <label>Genre</label>
          <select id="f_ru_genre">
            <option value="">—</option>
            <option value="masculin">Masculin</option>
            <option value="féminin">Féminin</option>
            <option value="neutre">Neutre</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Déclinaisons (optionnel)</label>
        <textarea id="f_ru_decl" placeholder='{"Nominatif": "работа", "Génitif": "работы"}'></textarea>
      </div>
    </div>

    <!-- Champs portugais -->
    <div class="lang-fields" id="fields_pt">
      <div class="form-row">
        <div class="form-group">
          <label>Genre</label>
          <select id="f_pt_genre">
            <option value="">—</option>
            <option value="masculin">Masculin</option>
            <option value="féminin">Féminin</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Phrase commune -->
    <div class="form-group">
      <label>Phrase exemple (natif)</label>
      <input type="text" id="f_phrase" placeholder="毎日ご飯を食べる。">
    </div>
    <div class="form-group">
      <label>Phrase romanisée</label>
      <input type="text" id="f_phrase_roman" placeholder="Mainichi gohan wo taberu.">
    </div>
    <div class="form-group">
      <label>Traduction FR de la phrase</label>
      <input type="text" id="f_phrase_fr" placeholder="Je mange du riz tous les jours.">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Audio — mot (fichier)</label>
        <input type="text" id="f_audio_word" placeholder="audio/ja/taberu.mp3">
      </div>
      <div class="form-group">
        <label>Audio — phrase (fichier)</label>
        <input type="text" id="f_audio_phrase" placeholder="audio/ja/taberu_phrase.mp3">
      </div>
    </div>
    <div class="form-group">
      <label>Notes / grammaire</label>
      <textarea id="f_notes" placeholder="Remarques, déclinaisons, usage particulier…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBtn">Annuler</button>
      <button class="btn-save" id="saveBtn">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ─── DONNÉES INITIALES (issues de tes captures Notion) ───────────────────────
const INITIAL_DATA = [
  // JAPONAIS
  {
    id: "ja_001", lang: "ja", niveau: "Maîtrisé",
    word: "食べる", reading: "たべる", roman: "taberu",
    translation: "Manger", category: "Verbe", subcat: "ichidan",

function updateCategorySelect(lang) {

  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function loadData() {
  try {
    const saved = localStorage.getItem('langdict_v1');
    return saved ? JSON.parse(saved) : [...INITIAL_DATA];
  } catch { return [...INITIAL_DATA]; }
}

function saveData(data) {
  try { localStorage.setItem('langdict_v1', JSON.stringify(data)); } catch {}
}

const LANG_NAMES = { ja: '日本語', zh: '中文', ru: 'Русский', pl: 'Polski', pt: 'Português BR' };

function catClass(cat) {
  const c = (cat||'').toLowerCase();
  if (c.includes('verbe')) return 'cat-verbe';
  if (c.includes('nom')) return 'cat-nom';
  if (c.includes('adjectif')) return 'cat-adjectif';
  if (c.includes('salutation')) return 'cat-salutation';
  if (c.includes('conjonction')) return 'cat-conjonction';
  if (c.includes('expression')) return 'cat-expression';
  if (c.includes('adverbe')) return 'cat-adverbe';
  if (c.includes('particule')) return 'cat-particule';
  if (c.includes('préposition') || c.includes('preposition')) return 'cat-preposition';
  if (c.includes('compteur')) return 'cat-compteur';
  if (c.includes('mesure')) return 'cat-mesure';
  return 'cat-nom';
}

function renderAudioBtn(path, label) {
  if (!path) return `<button class="audio-btn" onclick="event.stopPropagation(); playAudioDemo(this, '${label}')" title="Pas d'audio disponible">
    <svg viewBox="0 0 10 10"><polygon points="1,1 9,5 1,9"/></svg>${label}
  </button>`;
  return `<button class="audio-btn" onclick="event.stopPropagation(); playAudio(this, '${path}')">
    <svg viewBox="0 0 10 10"><polygon points="1,1 9,5 1,9"/></svg>${label}
  </button>`;
}

function renderCard(w) {
  let topLine = `<span class="word-main">${w.word}</span>`;
  if (w.reading) topLine += `<span class="word-reading">${w.reading}</span>`;
  if (w.roman) topLine += `<span class="word-roman">${w.roman}</span>`;

  let extraBadge = '';
  if (w.lang === 'zh' && w.ton) {
    extraBadge = `<span class="ton-badge">${w.ton} ${w.ton_symbol||''}</span>`;
  }
  if (w.lang === 'ja' && w.subcat) {
    extraBadge = `<span class="ton-badge">${w.subcat}</span>`;
  }
  if ((w.lang === 'pl' || w.lang === 'ru' || w.lang === 'pt') && w.genre) {
    extraBadge = `<span class="ton-badge">${w.genre}</span>`;
  }

  const nivClass = 'niv-' + (w.niveau||'Nouveau').replace(' ', '.');

  let phraseBlock = '';
  if (w.phrase) {
    phraseBlock = `
      <div class="phrase-block">
        <div class="phrase-label">Phrase exemple</div>
        <div class="phrase-text">${w.phrase}</div>
        ${w.phrase_reading ? `<div class="phrase-roman">${w.phrase_reading}</div>` : ''}
        ${w.phrase_roman && w.phrase_roman !== w.phrase_reading ? `<div class="phrase-roman">${w.phrase_roman}</div>` : ''}
        ${w.phrase_fr ? `<div class="phrase-fr">${w.phrase_fr}</div>` : ''}
      </div>`;
  }

  let audioRow = `<div class="audio-row">
    ${renderAudioBtn(w.audio_word, 'Mot')}
    ${renderAudioBtn(w.audio_phrase, 'Phrase')}
  </div>`;

  let notesBlock = '';
  if (w.notes) {
    notesBlock = `<div class="notes-block">${w.notes}</div>`;
  }

  return `
  <div class="word-card" data-id="${w.id}" onclick="toggleCard(this)">
    <div class="lang-dot ${w.lang}"></div>
    <div class="card-content">
      <div class="card-top">${topLine}</div>
      <div class="card-meta">
        <span class="translation">${w.translation}</span>
        <span class="category-tag ${catClass(w.category)}">${w.category}</span>
        ${extraBadge}
        <span class="niveau-badge ${nivClass}">${w.niveau||'Nouveau'}</span>
      </div>
      <div class="card-expanded">
        ${audioRow}
        ${phraseBlock}
        ${notesBlock}
      </div>
    </div>
  </div>`;
}

function filteredWords() {
  return words.filter(w => {
    if (filterLang !== 'all' && w.lang !== filterLang) return false;
    if (filterNiv !== 'all' && w.niveau !== filterNiv) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return (w.word||'').toLowerCase().includes(q)
        || (w.translation||'').toLowerCase().includes(q)
        || (w.roman||'').toLowerCase().includes(q)
        || (w.reading||'').includes(q)
        || (w.phrase||'').toLowerCase().includes(q);
    }
    return true;
  });
}

function render() {
  const list = filteredWords();
  const container = document.getElementById('wordList');
  document.getElementById('entryCount').textContent = `${words.length} entrée${words.length > 1 ? 's' : ''}`;

  if (list.length === 0) {
    container.innerHTML = '<div class="empty">Aucune entrée trouvée.</div>';
    return;
  }

  // Group by language
  const groups = {};
  list.forEach(w => { if (!groups[w.lang]) groups[w.lang] = []; groups[w.lang].push(w); });

  const langOrder = filterLang === 'all' ? ['ja','zh','ru','pl','pt'] : [filterLang];
  container.innerHTML = langOrder
    .filter(l => groups[l])
    .map(l => groups[l].map(renderCard).join(''))
    .join('');
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function toggleCard(el) {
  const expanded = el.querySelector('.card-expanded');
  if (!expanded) return;
  el.classList.toggle('open');
}

let currentAudio = null;
let currentBtn = null;

function playAudio(btn, path) {
  // Si on reclique sur le même bouton en cours de lecture → pause
  if (currentBtn === btn && currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    btn.classList.remove('playing');
    return;
  }
  // Si on reclique sur le même bouton en pause → reprise
  if (currentBtn === btn && currentAudio && currentAudio.paused) {
    currentAudio.play().catch(() => {});
    btn.classList.add('playing');
    return;
  }
  // Sinon : stop l'audio précédent, lance le nouveau
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    if (currentBtn) currentBtn.classList.remove('playing');
  }
  currentAudio = new Audio(path);
  currentBtn = btn;
  btn.classList.add('playing');
  currentAudio.play().catch(() => {});
  currentAudio.onended = () => {
    btn.classList.remove('playing');
    currentAudio = null;
    currentBtn = null;
  };
}

function playAudioDemo(btn, label) {
  btn.classList.add('playing');
  setTimeout(() => btn.classList.remove('playing'), 800);
}

  const word = document.getElementById('f_word').value.trim();
  if (!word) { alert('Le mot est requis.'); return; }

  const entry = {
    id: lang + '_' + Date.now(),
    lang,
    niveau: document.getElementById('f_niveau').value,
    word,
    roman: document.getElementById('f_roman').value.trim(),
    translation: document.getElementById('f_translation').value.trim(),
    category: document.getElementById('f_category').value,
    phrase: document.getElementById('f_phrase').value.trim(),
    phrase_roman: document.getElementById('f_phrase_roman').value.trim(),
    phrase_fr: document.getElementById('f_phrase_fr').value.trim(),
    audio_word: document.getElementById('f_audio_word').value.trim(),
    audio_phrase: document.getElementById('f_audio_phrase').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
  };

  if (lang === 'ja') {
    entry.reading = document.getElementById('f_ja_hira').value.trim();
    entry.subcat = document.getElementById('f_ja_subcat').value.trim();
  }
  if (lang === 'zh') {
    entry.ton = document.getElementById('f_zh_ton').value.trim();
    entry.ton_symbol = document.getElementById('f_zh_ton_symbol').value.trim();
  }
  if (lang === 'pl') {
    entry.genre = document.getElementById('f_pl_genre').value;
  }
  if (lang === 'ru') {
    entry.genre = document.getElementById('f_ru_genre').value;
  }
  if (lang === 'pt') {
    entry.genre = document.getElementById('f_pt_genre').value;
  }

  words.unshift(entry);
  saveData(words);
  document.getElementById('modalOverlay').classList.remove('open');
  // Reset form
  ['f_word','f_roman','f_translation','f_phrase','f_phrase_roman','f_phrase_fr',
   'f_audio_word','f_audio_phrase','f_notes','f_ja_hira','f_ja_subcat',
   'f_zh_ton','f_zh_ton_symbol','f_ru_decl'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  render();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
